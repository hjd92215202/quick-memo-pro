version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: memo_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/memo_db
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "3005:3000"
    depends_on:
      - db

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/memo_db
      APP_SECRET: ${JWT_SECRET}
      DATABASE_TYPE: postgresql
    ports:
      - "3006:3000"
    depends_on:
      - db